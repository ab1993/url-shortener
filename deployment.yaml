apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      containers:
        - name: url-shortener
          image: url-shortener:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          # ✅ Environment variable (K8s way)
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://mongo:27017/urlshortener

          # 🔥 FORCE override (this fixes your issue 100%)
          args:
            - "--spring.data.mongodb.uri=mongodb://mongo:27017/urlshortener"